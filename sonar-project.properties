sonar.projectKey=C3EQUALZz_agate
sonar.organization=c3equalzz
sonar.projectName=Agate
sonar.sources=crates
sonar.exclusions=**/target/**
sonar.sourceEncoding=UTF-8

# Coverage produced by `cargo llvm-cov --lcov` (see .github/workflows/sonarqube.yml).
sonar.rust.lcov.reportPaths=lcov.info
# Composition-root I/O glue — binary entrypoints, observability install
# (logging/metrics exporters), and app wiring — is exercised via e2e/manual
# runs rather than unit tests, so exclude it from the coverage metric. Domain,
# application, and config-mapping logic stay measured.
sonar.coverage.exclusions=**/main.rs,**/setup/observability/**,**/setup/bootstrap/**
