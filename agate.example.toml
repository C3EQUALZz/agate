# Example Agate configuration.
#
# Mount this into the container and point AGATE_CONFIG at it
# (default path: /etc/agate/agate.toml). Every value can be overridden by an
# environment variable named AGATE__<SECTION>__<KEY> (uppercase, "__" between
# levels), e.g. AGATE__AUDIT__DATABASE_URL — prefer env for secrets.
#
# Precedence (low → high): built-in defaults < this file < environment.

[proxy]
# Upstream agent run endpoint the proxy forwards to (required).
agent_endpoint = "http://agent:8000/run"
# Address the proxy listens on.
bind = "0.0.0.0:8080"
# --- Ingress hardening (all optional; defaults shown) ---
# Fail-fast connect timeout to the upstream agent, in seconds.
connect_timeout_secs = 5
# Idle timeout between upstream response chunks, in seconds. NOT an overall
# deadline — a healthy SSE stream runs as long as it needs to.
read_timeout_secs = 60
# Maximum accepted request body size, in bytes (1 MiB).
max_body_bytes = 1048576
# Maximum concurrently in-flight proxied runs. Each holds an upstream connection
# for its full stream; requests over the cap are shed with 503 (not queued).
max_concurrent_requests = 256
# Per-run response budget: cut a runaway agent off with a RUN_ERROR once it
# streams more than this many response events or bytes to the client. 0 = no
# limit. Defaults are generous (catch runaways, not legitimate long runs).
max_response_events = 100000
max_response_bytes = 67108864
# Per-client-IP request-rate limit on the proxied route. A single source IP over
# `rate_limit_per_second` (sustained) / `rate_limit_burst` (instantaneous) is
# shed with 429 Too Many Requests + a Retry-After hint. 0 = disabled (the
# default). The client IP is the connection peer, so enable this only where
# Agate sees the real client — behind a load balancer it is the balancer's IP.
rate_limit_per_second = 0
rate_limit_burst = 0
# API-key authentication on the `X-API-Key` header. A request is accepted if it
# matches ANY accepted key; with none set the proxy is open (only sensible
# behind another gateway).
#
# Single key (shorthand) — can come from the env override for the secret:
#   AGATE__PROXY__API_KEY=...
# api_key = "change-me"
#
# Multiple keys enable zero-downtime rotation: add the new key, migrate clients,
# then drop the old. Set them here (merged with api_key above).
# api_keys = ["current-key", "next-key"]

[audit]
# Which persistence backend assembles at startup.
backend = "postgres"
# PostgreSQL URL for the transparency log (required for backend = "postgres").
# Supply the password via the env override, not here:
#   AGATE__AUDIT__DATABASE_URL=postgres://agate:<password>@postgres:5432/agate
database_url = "postgres://agate@postgres:5432/agate"
# --- Connection pool + startup resilience (all optional; defaults shown) ---
# Maximum pooled database connections.
max_connections = 10
# How long to wait for a free pooled connection before erroring, in seconds.
acquire_timeout_secs = 30
# Initial-connect retries before giving up (0 = try once). Lets the process ride
# out a database that is still starting up beside it (compose/Kubernetes).
connect_max_retries = 10
# Base backoff between connect attempts, in seconds (doubled each retry, capped).
connect_backoff_secs = 1
# --- Signed checkpoints (Signed Tree Heads) ---
# A background task issues a signed STH for the log on this interval, in seconds
# (0 = disabled, the default). Like a Certificate Transparency log, this is the
# log's own tamper-evidence cadence; an idle log between ticks is not re-anchored.
checkpoint_interval_secs = 0
# The signing key id the issuer requests — must match the key the store loaded.
checkpoint_key_id = "checkpoint-ed25519"
# The Ed25519 signing key itself is NEVER in this file. Supply it via the
# environment (32 bytes, hex), and optionally override the key id:
#   AUDIT_CHECKPOINT_SEED=<64 hex chars>
#   AUDIT_CHECKPOINT_KEY_ID=checkpoint-ed25519
# Without the seed, checkpoint signing is disabled and the interval is moot.

[policy.tools]
# allow-all | allowlist | denylist
mode = "allowlist"
# Tools governed by `mode` (ignored when mode = "allow-all"). Each entry matches
# the whole tool name, case-sensitively: a bare name is exact, `glob:` is
# shell-style (*/?), `regex:` is a regex anchored to the whole name.
names = ["search", "fetch", "glob:fs.*", "regex:db_.*"]

# Argument-level deny rules: a permitted tool call is still blocked when its
# arguments match a marker. Each rule sets exactly one of `contains` (a
# case-insensitive literal) or `matches` (a regex). `tool` scopes the rule to
# one tool; omit it to apply to any tool. `path` (a dotted path like `url` or
# `config.endpoint`) scopes the match to one field of the parsed arguments;
# omit it to match the whole raw argument string. Add as many tables as needed.
[[policy.tools.deny_arguments]]
tool = "search"
contains = "rm -rf"
[[policy.tools.deny_arguments]]
# Regex on a single field: block fetch when its `url` argument points at the
# cloud metadata IP, without firing on the same text in an unrelated field.
tool = "fetch"
path = "url"
matches = "^https?://169\\.254\\.169\\.254"

# Result-level deny rules: a tool RESULT is blocked (dropped before the client)
# when its content matches. Same shape as deny_arguments; `tool` scopes the rule
# to one tool (only when the result's tool is known), `path` to one result field.
[[policy.tools.deny_results]]
# Block any result that leaks a private key.
contains = "BEGIN RSA PRIVATE KEY"

[policy]
# Literal markers redacted from emitted assistant text (case-insensitive).
redact = ["sk-", "AKIA"]
# Regex markers redacted from emitted text, applied IN ADDITION to `redact`
# above (full regex syntax; prefix (?i) for case-insensitivity). An invalid
# expression aborts startup.
redact_regex = ["sk-[A-Za-z0-9]{20,}", "AKIA[0-9A-Z]{16}"]
# On a policy-decision timeout: "open" (forward) or "closed" (block). Defaults to
# the secure "closed".
fail_mode = "closed"
# Deadline for a single policy decision, in milliseconds (must be > 0).
decision_timeout_ms = 5000
# A recognized response event that is malformed (a known type with a missing or
# blank required field) cannot be inspected. What to do with it: "forward"
# (pass the raw frame), "drop" (discard it), or "terminate" (end the run with a
# RUN_ERROR). Defaults to the secure "terminate".
on_malformed_event = "terminate"

[observability.logging]
# Set false to silence logs entirely.
enabled = true
# pretty (console) | json (structured, one object per line)
format = "pretty"
# Filter directive; RUST_LOG overrides it when set.
level = "info"

[observability.metrics]
# Expose a Prometheus /metrics endpoint (off by default).
enabled = false
# prometheus | none
exporter = "prometheus"
# Its own port — scraped by Prometheus inside the network, NOT the public
# data-plane port. Map/expose it only where your scraper can reach it.
bind = "0.0.0.0:9090"

[observability.tracing]
# Export spans to an OTLP collector (off by default; spans stay log-only).
enabled = false
# OTLP gRPC endpoint of the collector (e.g. an OpenTelemetry Collector).
endpoint = "http://localhost:4317"
# service.name reported on exported spans.
service_name = "agate-server"

[tls]
# Serve HTTPS directly (off by default — plain HTTP, sensible only behind a
# TLS-terminating gateway). When enabled, cert + key are required.
enabled = false
# Path to the PEM certificate chain (leaf certificate first).
cert = "/etc/agate/tls/cert.pem"
# Path to the PEM private key for the certificate.
key = "/etc/agate/tls/key.pem"
