global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Agate exposes Prometheus metrics on its own port (see
  # [observability.metrics].bind in agate.toml, default 0.0.0.0:9090).
  # Default target = the host's :9090, so this works with any Agate that
  # publishes -p 9090:9090. Point it at a container name instead if you run
  # Agate on the same Docker network.
  - job_name: agate
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          service: agate
