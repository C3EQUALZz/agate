name: agate-observability

# Prometheus + Grafana, pre-provisioned with the Agate dashboard. Point it at any
# Agate that publishes its metrics port (-p 9090:9090); see prometheus/prometheus.yml.
#
#   docker compose -f deploy/observability/docker-compose.yaml up
#
# Grafana → http://localhost:3000 (anonymous viewer; admin/admin to edit).
# Prometheus → http://localhost:9091.

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    extra_hosts:
      # Lets the container reach the host's published :9090 on Linux too.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    # LOCAL DEMO ONLY: admin/admin and anonymous viewing are for convenience on a
    # developer machine. Do NOT expose this stack publicly — set a real password
    # (GF_SECURITY_ADMIN_PASSWORD) and disable anonymous access for any shared use.
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
