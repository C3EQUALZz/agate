# The protected demo: the AG-UI agent + Agate + Postgres.
#
#   client в”Ђв”ЂPOST /в”Ђв”Ђв–¶ Agate (:8080) в”Ђв”Ђforwardв”Ђв”Ђв–¶ agent (:8000/run)
#                         в”‚ inspect each SSE event (allow / deny / redact)
#                         в””в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв–¶ Postgres transparency log
#
# Run:   docker compose up --build
# Then:  (from this dir, with uv)  uv run protected-demo-client
# Or:    uv run protected-demo-client --url http://localhost:8080/

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: agate
      POSTGRES_PASSWORD: agate
      POSTGRES_DB: agate
    # The healthcheck lets Agate wait until Postgres can accept connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agate -d agate"]
      interval: 2s
      timeout: 3s
      retries: 20

  agent:
    # Builds the agent-basic image (stub mode вЂ” no API key needed).
    build:
      context: ../agent-basic
    environment:
      AGENT_BACKEND: stub
    # Not published to the host: only Agate should reach the agent, so traffic
    # is forced through the proxy. Expose it for debugging if you like.
    expose:
      - "8000"

  agate:
    image: ghcr.io/c3equalzz/agate:latest
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./agate.toml:/etc/agate/agate.toml:ro
    environment:
      AGATE_CONFIG: /etc/agate/agate.toml
      # Password supplied here, not in agate.toml.
      AGATE__AUDIT__DATABASE_URL: "postgres://agate:agate@db:5432/agate"
      # After the first run, copy the printed log id here and set it so restarts
      # append to the SAME transparency log:
      # AUDIT_LOG_ID: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
