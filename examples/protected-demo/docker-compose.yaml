# The protected demo: the AG-UI agent + Agate + Postgres.
#
#   client в”Ђв”ЂPOST /в”Ђв”Ђв–¶ Agate (:8080) в”Ђв”Ђforwardв”Ђв”Ђв–¶ agent (:8000/api/run)
#                         в”‚ inspect each SSE event (allow / deny / redact)
#                         в””в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв–¶ Postgres transparency log
#
# Run:   docker compose up --build
# Then:  (from this dir, with uv)  uv run protected-demo-client

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agate
      POSTGRES_PASSWORD: agate
      POSTGRES_DB: agate
    # The healthcheck lets Agate wait until Postgres can accept connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agate -d agate"]
      interval: 2s
      timeout: 3s
      retries: 20

  agent:
    # Builds the ag-ui-agent image in its default STUB backend вЂ” no API key, no
    # AG2/OpenAI deps. The stub emits a safe search call, a dangerous delete_file
    # call, and a secret-leaking text message, so Agate has all three protections
    # to demonstrate.
    build:
      context: ../ag-ui-agent
    environment:
      AGENT__BACKEND: stub
    # Not published to the host: only Agate should reach the agent, so all
    # traffic is forced through the proxy. Expose it for debugging if you like.
    expose:
      - "8000"

  agate:
    image: ghcr.io/c3equalzz/agate:latest
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./agate.toml:/etc/agate/agate.toml:ro
    environment:
      AGATE_CONFIG: /etc/agate/agate.toml
      # Password supplied here, not in agate.toml.
      AGATE__AUDIT__DATABASE_URL: "postgres://agate:agate@db:5432/agate"
