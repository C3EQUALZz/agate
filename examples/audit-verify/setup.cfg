# flake8 + wemake-python-styleguide (WPS). flake8 does not read pyproject.toml.
# Run with:  uv run flake8 src tests
[flake8]
select = WPS, E, W, F, C, N, B, D, I, Q, S, A, T, E999
max-line-length = 100
max-complexity = 6
docstring-style = google
i-control-code = True

extend-ignore =
    # WPS226: over-use of string literals — SQL column / field names recur.
    WPS226,
    # WPS305: f-strings — used for rendering; readable and safe here.
    WPS305,
    # WPS412: logic in __init__ — our __init__ files are pure re-export facades.
    WPS412,
    # WPS410: wrong metadata variable — __all__ re-export lists trip this.
    WPS410,
    # WPS306: class without explicit base — plain dataclasses are idiomatic.
    WPS306,
    # D104: missing docstring in public package — re-export __init__ files.
    D104,
    # E203: whitespace before ':' — conflicts with the ruff/black formatter.
    E203,
    RST201, RST203, RST301

per-file-ignores =
    */__init__.py: WPS201, WPS235, F401
    tests/*: WPS, S101, D100, D101, D102, D103
    # cli.py is the tool's terminal-output module: writing the report to stdout
    #   via print is its entire purpose, so WPS421 ("wrong function call: print")
    #   does not apply.
    src/audit_verify/cli.py: WPS421
    # audit_log_gateway.py is the persistence adapter: `_summarize` maps a log
    #   entity plus leaf aggregates into the domain summary, so it legitimately
    #   binds more locals than WPS210's production-logic limit allows.
    src/audit_verify/adapters/audit_log_gateway.py: WPS210

exclude = .git, __pycache__, .venv, build, dist
