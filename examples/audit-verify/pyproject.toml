[project]
name = "audit-verify"
version = "0.1.0"
description = "Inspect Agate's transparency log: show the recorded (event, verdict) leaves"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    # Pure-Python Postgres driver — no system libpq needed.
    "psycopg[binary]>=3.1",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
]

[project.scripts]
audit-verify = "audit_verify.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/audit_verify"]

[tool.ruff]
line-length = 100
target-version = "py310"
