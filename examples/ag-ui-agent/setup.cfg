# flake8 + wemake-python-styleguide (WPS) configuration.
#
# flake8 does not read pyproject.toml, so its config lives here. WPS is run at
# high strictness: we keep WPS's strict defaults (max-complexity, max-* limits,
# the full bundled plugin set) and only add narrowly-scoped, commented ignores
# where a rule fights this example's deliberate structure. Run with:
#
#     uv run flake8 src tests
#
[flake8]
# Run wemake-python-styleguide (WPS*) and flake8's own syntax check (E999), plus
# the strict plugin codes WPS bundles. WPS ships flake8-bugbear, -commas,
# -comprehensions, -docstrings, -eradicate, -isort, -quotes, etc.; selecting
# their prefixes keeps the whole strict suite active rather than a tiny subset.
select = WPS, E, W, F, C, N, B, D, I, Q, RST, DAR, S, A, T, P, E999

# Align with ruff/the formatter (ruff owns formatting; WPS owns smells).
max-line-length = 100
# WPS default complexity is intentionally low (6). Kept as-is for strictness.
max-complexity = 6

# Google-style docstrings (matches the ruff pydocstyle convention).
docstring-style = google

# WPS counts a module's own docstring/imports; these mirror its strict defaults
# and are listed explicitly so the gate is self-documenting.
max-module-members = 12
max-methods = 8
max-imports = 14

# flake8 cannot resolve namespaces; let WPS use the package name for its checks.
i-control-code = True

# Rules that conflict with tooling we already run, or with this example's
# deliberate design. Each is justified; none is a blanket silencer.
extend-ignore =
    # WPS226: over-use of string literals — Pydantic Field aliases, AG-UI event
    #   "type" tags and SSE keys are unavoidably string-heavy here.
    WPS226,
    # WPS305: f-strings — used for SSE frame/JSON assembly; banning them hurts
    #   readability with no safety gain in this example.
    WPS305,
    # WPS412: logic in __init__.py — our package __init__ files are pure
    #   re-export facades (the layered public API), which WPS flags.
    WPS412,
    # WPS410: wrong metadata variable — __all__ re-export lists trip this.
    WPS410,
    # D104: missing docstring in public package — re-export __init__ files.
    D104,
    # RST: docstrings use reStructuredText cross-refs (:class:, ``x``) that the
    #   darglint/RST checker can misparse; ruff's pydocstyle already covers form.
    RST201, RST203, RST301,
    # WPS115: upper-case class attributes — Pydantic/StrEnum style uses them.
    WPS115,
    # WPS306: class without a base class — plain classes are idiomatic here.
    WPS306,

per-file-ignores =
    # Re-export facades: many imports, no logic, __all__ lists.
    */__init__.py: WPS201, WPS235, F401
    # Tests: asserts, magic numbers, fixtures, nested helpers and long modules
    #   are expected; WPS's production-grade limits do not apply to test code.
    tests/*: WPS, S101, D100, D101, D102, D103
    # Settings: Pydantic BaseSettings models legitimately carry many class-level
    #   fields and use SettingsConfigDict assignment in the class body.
    src/ag_ui_agent/config.py: WPS226, WPS115
    # Prompts module: one long string constant by design.
    src/ag_ui_agent/api/agent/prompts.py: WPS226, WPS323, E501

exclude =
    .git,
    __pycache__,
    .venv,
    build,
    dist
