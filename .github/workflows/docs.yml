name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/check-mermaid.sh"
      - "scripts/check-i18n.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/check-mermaid.sh"
      - "scripts/check-i18n.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege by default; the deploy job widens to what Pages needs.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install docs toolchain
        run: python -m pip install -r docs/requirements.txt
      - name: Build
        run: mkdocs build --strict --site-dir site
      - name: Upload Pages artifact
        # Only needed when we will deploy (push to main); harmless on PRs but
        # skipped to keep PR runs build-only.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  mermaid:
    name: Validate Mermaid diagrams (mmdc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      # mkdocs build does not validate Mermaid (it renders client-side), so parse
      # every diagram with the real engine here to catch "Syntax error in text".
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli@11.15.0
      - name: Validate fenced mermaid blocks
        run: ./scripts/check-mermaid.sh

  i18n:
    name: Check bilingual docs (parity + drift-guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # `git hash-object` operates on the working-tree file, so a plain
      # checkout (no full history) is sufficient for the drift-guard.
      - name: Check EN/RU parity and threat-model translation drift
        run: bash ./scripts/check-i18n.sh

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
