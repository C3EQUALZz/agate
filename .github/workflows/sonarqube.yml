name: SonarQube

on:
  push:
    branches: [main]
  pull_request:

# Dormant until enabled: set repository variable ENABLE_SONAR=true and secrets
# SONAR_TOKEN + SONAR_HOST_URL. Rust analysis requires SonarQube 10.6+ (or SonarCloud).
permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SONAR == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@689fb39b34b9aa95ebc5f8f119343ddd51542402 # v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
