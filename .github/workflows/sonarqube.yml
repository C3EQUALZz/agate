name: SonarQube

on:
  push:
    branches: [main]
  pull_request:

# Targets SonarQube Cloud (sonarcloud.io): the org/project live in
# sonar-project.properties, so only the SONAR_TOKEN secret is needed (the host
# defaults to sonarcloud.io). Gated on the ENABLE_SONAR repository variable
# because secrets cannot be referenced in a job `if`; set ENABLE_SONAR=true to
# activate. Rust analysis requires SonarQube 10.6+ / SonarQube Cloud.
permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SONAR == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov
      # Pre-pull the testcontainers Postgres image with retries so a transient
      # Docker Hub rate-limit/timeout doesn't fail the coverage run's e2e tests.
      - name: Pre-pull Postgres image
        run: |
          for attempt in 1 2 3 4 5; do
            docker pull postgres:17-alpine && exit 0
            echo "docker pull failed (attempt ${attempt}); retrying in 15s" >&2
            sleep 15
          done
          echo "could not pull postgres:17-alpine after 5 attempts" >&2
          exit 1
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
