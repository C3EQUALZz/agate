name: SonarQube

on:
  push:
    branches: [main]
  pull_request:

# Targets SonarQube Cloud (sonarcloud.io): the org/project live in
# sonar-project.properties, so only the SONAR_TOKEN secret is needed (the host
# defaults to sonarcloud.io). Gated on the ENABLE_SONAR repository variable
# because secrets cannot be referenced in a job `if`; set ENABLE_SONAR=true to
# activate. Rust analysis requires SonarQube 10.6+ / SonarQube Cloud.
permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SONAR == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
