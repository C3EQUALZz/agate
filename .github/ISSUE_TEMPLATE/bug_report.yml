name: Bug report
description: Report a defect in Agate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Do **not** include secrets or vulnerabilities here —
        use private reporting (see SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust toolchain (`rustc -V`), enabled features.
    validations:
      required: false
