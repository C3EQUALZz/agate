[advisories]
version = 2
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained (its PEM parsing moved into rustls-pki-types).
    # It reaches us only transitively through axum-server's TLS listener; it is an
    # "unmaintained" advisory, not a vulnerability. Drop this once axum-server
    # stops depending on it.
    "RUSTSEC-2025-0134",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
version = 2
confidence-threshold = 0.9
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Mozilla CA root store data shipped by webpki-roots (via rustls).
    "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
