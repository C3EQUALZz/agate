[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
version = 2
confidence-threshold = 0.9
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Mozilla CA root store data shipped by webpki-roots (via rustls).
    "CDLA-Permissive-2.0",
    # Boost Software License — permissive, OSI-approved, no binary attribution.
    # Pulled (BSL-1.0-only) by xxhash-rust via redis 1.x.
    "BSL-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
